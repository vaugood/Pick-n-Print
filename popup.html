<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Element Print Picker</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <h1>Print Picker</h1>

  <div class="buttons">
    <button id="start">Start Picker</button>
    <button id="stop">Stop Picker</button>
    <button id="print">Print Selected</button>
    <button id="clear">Clear Selection</button>
  </div>

  <p class="hint">
    Start picker, click elements on the page, then print.
  </p>

  <script src="popup.js"></script>
</body>
</html>
